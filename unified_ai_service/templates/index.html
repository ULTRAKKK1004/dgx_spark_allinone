<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multimodal AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .btn-primary { background: var(--primary); transition: all 0.2s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1.5rem; transition: all 0.3s; position: relative; overflow: hidden; }
        
        /* Layout */
        .app-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100dvh;
            width: 100vw;
        }
        @media (max-width: 1024px) { 
            .app-grid { grid-template-columns: 1fr; } 
            .sidebar { display: none; } 
        }
        
        .tab-content { display: none; height: 100%; overflow-y: auto; }
        .tab-content.active { display: block; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div class="app-grid">
        <!-- Sidebar -->
        <aside class="sidebar glass border-r flex flex-col p-6 space-y-8 overflow-y-auto">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-900/20">
                    <i class="fas fa-brain text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">AI Hub</h1>
                    <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Phase C Studio</p>
                </div>
            </div>

            <nav class="flex-grow space-y-2">
                <button onclick="switchTab('studio')" id="nav-studio" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-emerald-500/10 text-emerald-400 font-bold transition">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span>AI Studio</span>
                </button>
                <button onclick="switchTab('history')" id="nav-history" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 transition">
                    <i class="fas fa-history"></i>
                    <span>Task History</span>
                </button>
                <button onclick="switchTab('gallery')" id="nav-gallery" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 transition">
                    <i class="fas fa-images"></i>
                    <span>Gallery</span>
                </button>

                <!-- Admin Button (Condition in JS) -->
                <div id="admin-section" class="hidden pt-4">
                    <p class="text-[10px] text-slate-500 font-bold uppercase px-4 mb-2">Management</p>
                    <a href="/admin" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-amber-400 hover:bg-amber-500/10 transition">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin Console</span>
                    </a>
                </div>

                <div class="pt-4">
                    <p class="text-[10px] text-slate-500 font-bold uppercase px-4 mb-2">Settings</p>
                    <button onclick="generateApiKey()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 transition text-left">
                        <i class="fas fa-key"></i>
                        <span>Generate API Key</span>
                    </button>
                    <a href="/logout" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-400 hover:text-red-400 hover:bg-white/5 transition lg:hidden">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </nav>

            <div class="pt-6 border-t border-white/5">
                <div class="bg-slate-900/50 rounded-2xl p-4 space-y-3">
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-slate-500 font-bold uppercase tracking-tighter">Usage Quota</span>
                        <span class="text-emerald-500 font-bold" id="quota-val">...</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                        <div id="quota-bar" class="bg-emerald-500 h-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center space-x-3 p-2">
                <img src="{{ user_image }}" class="w-10 h-10 rounded-full border border-white/10" onerror="this.src='https://ui-avatars.com/api/?name={{ user_name }}'">
                <div class="min-w-0">
                    <p class="text-sm font-bold truncate">{{ user_name }}</p>
                    <p class="text-[10px] text-slate-500 truncate">{{ user_email }}</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex flex-col relative overflow-hidden">
            <!-- Mobile Header & Nav -->
            <header class="h-16 flex lg:hidden items-center justify-between px-4 border-b border-white/5 shrink-0 glass z-50">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-brain text-emerald-500"></i>
                    <span class="font-bold">AI Hub</span>
                </div>
                <div class="flex space-x-4 text-slate-400">
                    <button onclick="switchTab('studio')"><i class="fas fa-wand-magic-sparkles"></i></button>
                    <button onclick="switchTab('history')"><i class="fas fa-history"></i></button>
                    <button onclick="switchTab('gallery')"><i class="fas fa-images"></i></button>
                </div>
            </header>

            <!-- Desktop Header -->
            <header class="h-16 hidden lg:flex items-center justify-between px-8 border-b border-white/5 shrink-0">
                <h2 id="view-title" class="text-lg font-bold">Multimodal AI Studio</h2>
                <div class="flex items-center space-x-4">
                    <a href="/logout" class="text-slate-500 hover:text-white transition"><i class="fas fa-sign-out-alt"></i></a>
                </div>
            </header>

            <!-- Workspace Areas -->
            <div class="flex-grow overflow-hidden relative">
                <!-- Tab: Studio -->
                <div id="tab-studio" class="tab-content active p-4 lg:p-8 space-y-8">
                    <div id="chat-feed" class="max-w-4xl mx-auto space-y-6 pb-32">
                        <!-- Welcome Card -->
                        <div id="welcome-card" class="card p-8 text-center space-y-4">
                            <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto">
                                <i class="fas fa-sparkles text-blue-400 text-2xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold">What can I create for you today?</h3>
                            <p class="text-slate-400 max-w-md mx-auto text-sm lg:text-base">이미지, 오디오, 대본 등을 업로드하고 자연어로 지시하세요.</p>
                            <div class="flex flex-wrap justify-center gap-2 pt-4 text-[10px] lg:text-xs">
                                <button onclick="fillExample('강아지 이미지를 시네마틱하게 만들어줘')" class="px-4 py-2 bg-slate-800 rounded-full hover:bg-slate-700 transition">이미지 생성</button>
                                <button onclick="fillExample('이 오디오를 텍스트로 변환해줘')" class="px-4 py-2 bg-slate-800 rounded-full hover:bg-slate-700 transition">STT</button>
                                <button onclick="fillExample('이 사진 속 강사가 대본대로 말하는 강의 영상을 만들어줘')" class="px-4 py-2 bg-slate-800 rounded-full hover:bg-slate-700 transition">AI 강의</button>
                            </div>
                        </div>
                        <!-- Result cards will appear here -->
                    </div>
                </div>

                <!-- Tab: History -->
                <div id="tab-history" class="tab-content p-4 lg:p-8">
                    <div class="max-w-5xl mx-auto space-y-6">
                        <div class="flex justify-between items-center">
                            <h3 class="text-xl font-bold">Task History</h3>
                            <button onclick="loadHistory()" class="text-xs font-bold text-emerald-400 hover:underline"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
                        </div>
                        <div id="history-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- History items -->
                        </div>
                    </div>
                </div>

                <!-- Tab: Gallery -->
                <div id="tab-gallery" class="tab-content p-4 lg:p-8">
                    <div class="max-w-5xl mx-auto">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold">Media Gallery</h3>
                            <label class="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-white rounded-xl font-bold cursor-pointer transition text-sm">
                                <i class="fas fa-upload mr-1"></i> Upload
                                <input type="file" class="hidden" accept="image/*,video/*" onchange="uploadToGallery(this.files[0])">
                            </label>
                        </div>
                        <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20">
                            <!-- Media items -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Floating Input Bar -->
            <div class="absolute bottom-0 left-0 right-0 p-4 lg:p-6 bg-gradient-to-t from-slate-950 via-slate-950/95 to-transparent pointer-events-none">
                <div class="max-w-4xl mx-auto pointer-events-auto">
                    <!-- File Preview Area -->
                    <div id="file-previews" class="flex flex-wrap gap-2 mb-3 empty:hidden bg-slate-900/80 p-3 rounded-2xl border border-white/5 overflow-x-auto max-h-24"></div>
                    
                    <!-- Main Input Container -->
                    <div class="glass rounded-[2rem] p-2 shadow-2xl flex flex-col space-y-1 border-emerald-500/10">
                        <textarea id="main-input" rows="1" class="w-full bg-transparent px-6 py-4 text-sm lg:text-base outline-none resize-none placeholder-slate-500" placeholder="지침 입력 및 파일 드래그..." oninput="autoResize(this)"></textarea>
                        
                        <div class="flex items-center justify-between px-4 pb-2">
                            <div class="flex items-center space-x-1 lg:space-x-2">
                                <!-- Multi-file trigger -->
                                <label class="p-2 text-slate-400 hover:text-emerald-400 transition cursor-pointer flex items-center space-x-1">
                                    <input type="file" id="file-input" multiple class="hidden" onchange="handleFiles(this.files)">
                                    <i class="fas fa-paperclip text-lg lg:text-xl"></i>
                                    <span class="hidden sm:inline text-[9px] font-bold uppercase tracking-wider">Attach</span>
                                </label>
                                
                                <div class="h-4 w-px bg-white/5 mx-1 lg:mx-2"></div>
                                
                                <select id="voice-provider" class="bg-transparent text-[9px] font-bold text-slate-500 outline-none cursor-pointer hover:text-slate-300 transition uppercase max-w-[80px]">
                                    <option value="elevenlabs">ElevenLabs</option>
                                    <option value="local_f5">Local F5</option>
                                </select>
                                <select id="quality-selector" class="bg-transparent text-[9px] font-bold text-slate-500 outline-none cursor-pointer hover:text-slate-300 transition uppercase">
                                    <option value="standard">Standard</option>
                                    <option value="high">High</option>
                                    <option value="draft">Draft</option>
                                </select>
                            </div>
                            
                            <button id="send-btn" onclick="requestPlan()" class="btn-primary w-10 h-10 lg:w-12 lg:h-12 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-emerald-900/40">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Plan Approval Modal -->
    <div id="plan-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4">
        <div class="glass max-w-2xl w-full rounded-3xl p-6 lg:p-8 space-y-6 shadow-2xl border-emerald-500/20 overflow-y-auto max-h-[90vh] animate-slide-up">
            <div>
                <h3 class="text-2xl font-bold mb-1">AI Task Plan</h3>
                <p class="text-sm text-slate-400">Review execution steps.</p>
            </div>
            
            <div id="plan-steps" class="space-y-3"></div>
            
            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="closeModal('plan-modal')" class="py-4 bg-slate-800 rounded-2xl font-bold">Cancel</button>
                <button id="confirm-execute-btn" onclick="executePlan()" class="py-4 btn-primary text-white rounded-2xl font-bold text-lg">Approve & Run</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let currentPlanData = null;
        const currentUserEmail = "{{ user_email }}";

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('bg-emerald-500/10', 'text-emerald-400', 'font-bold');
                b.classList.add('text-slate-400');
            });
            const btn = document.getElementById('nav-' + tabId);
            if (btn) {
                btn.classList.add('bg-emerald-500/10', 'text-emerald-400', 'font-bold');
                btn.classList.remove('text-slate-400');
            }

            if (tabId === 'history') loadHistory();
            if (tabId === 'gallery') loadGallery();
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
        }

        function fillExample(txt) {
            const input = document.getElementById('main-input');
            input.value = txt;
            autoResize(input);
            document.getElementById('welcome-card').classList.add('opacity-50');
        }

        function handleFiles(files) {
            for (let f of files) {
                if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) {
                    selectedFiles.push(f);
                }
            }
            renderFilePreviews();
        }

        function removeFile(i) {
            selectedFiles.splice(i, 1);
            renderFilePreviews();
        }

        function renderFilePreviews() {
            const container = document.getElementById('file-previews');
            container.innerHTML = selectedFiles.map((f, i) => `
                <div class="relative group bg-emerald-500/10 rounded-xl p-2 pr-8 border border-emerald-500/20 flex items-center space-x-2 shrink-0 animate-slide-up">
                    <i class="fas ${getFileIcon(f.type)} text-emerald-500 text-sm"></i>
                    <div class="min-w-0">
                        <p class="text-[9px] font-bold truncate max-w-[100px]">${f.name}</p>
                    </div>
                    <button onclick="removeFile(${i})" class="absolute right-1 text-slate-500 hover:text-red-400 transition">
                        <i class="fas fa-times text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        function getFileIcon(type) {
            if (type.startsWith('image/')) return 'fa-image';
            if (type.startsWith('video/')) return 'fa-video';
            if (type.startsWith('audio/')) return 'fa-waveform-lines';
            return 'fa-file-lines';
        }

        async function requestPlan() {
            const instruction = document.getElementById('main-input').value.trim();
            if (!instruction && selectedFiles.length === 0) return;

            const btn = document.getElementById('send-btn');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            const formData = new FormData();
            formData.append('instruction', instruction);
            formData.append('dry_run', 'true');
            formData.append('quality', document.getElementById('quality-selector').value);
            formData.append('preferred_voice_provider', document.getElementById('voice-provider').value);
            selectedFiles.forEach(f => formData.append('files', f));

            const token = localStorage.getItem('api_token');
            const headers = {};
            if (token && token !== 'AI_HUB_INTERNAL') {
                headers['Authorization'] = "Bearer " + token;
            }

            try {
                const res = await fetch('/api/multimodal/execute', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });
                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();
                if (data.dry_run) {
                    currentPlanData = data;
                    showPlanModal(data.plan);
                } else {
                    alert('Planning failed');
                }
            } catch (e) {
                alert('Planning error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        function showPlanModal(plan) {
            const container = document.getElementById('plan-steps');
            container.innerHTML = plan.steps.map((step, i) => `
                <div class="flex items-start space-x-4 p-4 rounded-2xl bg-white/5 border border-white/5">
                    <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-xs font-bold text-emerald-500 shrink-0">${i+1}</div>
                    <div class="flex-grow min-w-0">
                        <p class="text-sm font-bold text-white truncate">${step.action.toUpperCase().replace('.', ' ')}</p>
                        <p class="text-[10px] text-slate-500 mt-1 truncate">${JSON.stringify(step.inputs)}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('plan-modal').classList.remove('hidden');
        }

        async function executePlan() {
            const btn = document.getElementById('confirm-execute-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Starting...';

            const formData = new FormData();
            formData.append('instruction', currentPlanData.plan.goal);
            formData.append('dry_run', 'false');
            formData.append('quality', currentPlanData.plan.quality);
            formData.append('preferred_voice_provider', document.getElementById('voice-provider').value);
            selectedFiles.forEach(f => formData.append('files', f));

            const token = localStorage.getItem('api_token');
            const headers = {};
            if (token && token !== 'AI_HUB_INTERNAL') {
                headers['Authorization'] = "Bearer " + token;
            }

            try {
                const res = await fetch('/api/multimodal/execute', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });
                const data = await res.json();
                if (data.job_id) {
                    closeModal('plan-modal');
                    switchTab('history');
                    // Reset
                    document.getElementById('main-input').value = '';
                    selectedFiles = [];
                    renderFilePreviews();
                } else if (data.detail) {
                    alert('Error: ' + data.detail);
                }
            } catch (e) { alert('Execution failed: ' + e.message); }
            btn.disabled = false;
            btn.innerHTML = 'Approve & Run';
        }

        async function loadHistory() {
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;

                const res = await fetch('/api/jobs', {headers: headers});
                const jobs = await res.json();
                const list = document.getElementById('history-list');
                list.innerHTML = Object.values(jobs).sort((a,b) => b.created_at - a.created_at).map(job => `
                    <div class="card p-5 space-y-3 relative group animate-slide-up">
                        <div class="flex justify-between items-start">
                            <span class="px-2 py-0.5 rounded bg-white/5 text-[9px] font-black uppercase text-slate-500">${job.type}</span>
                            <span class="text-[10px] font-bold ${getStatusColor(job.status)} uppercase">${job.status}</span>
                        </div>
                        <p class="text-xs font-medium line-clamp-2">${job.input.instruction || job.id}</p>
                        ${renderJobResult(job)}
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('history-list').innerHTML = '<p class="text-red-400">Failed to load history</p>';
            }
        }

        function getStatusColor(s) {
            if (s === 'completed') return 'text-emerald-400';
            if (s === 'failed') return 'text-red-400';
            return 'text-blue-400 animate-pulse';
        }

        function renderJobResult(job) {
            if (job.status !== 'completed' || !job.result) return '';
            const res = job.result;
            const finalVal = res.final?.url || res.final?.value || res;
            if (typeof finalVal === 'string' && finalVal.startsWith('/api/results/')) {
                if (finalVal.match(/\.(png|jpg|jpeg|webp)$/i)) return `<img src="${finalVal}" class="rounded-lg max-h-32 w-full object-cover">`;
                if (finalVal.match(/\.(mp4|webm)$/i)) return `<div class="bg-black/20 rounded-lg p-2 flex items-center justify-center space-x-2 text-[10px] font-bold text-emerald-400"><i class="fas fa-video"></i> <span>Video Ready</span></div>`;
            }
            return '<div class="text-[10px] text-slate-500">Result available</div>';
        }

        async function deleteJob(jobId) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;
                
                await fetch('/api/jobs/' + jobId, { method: 'DELETE', headers: headers });
                loadGallery();
                loadHistory();
            } catch (e) { alert('Delete failed'); }
        }

        async function uploadToGallery(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;
                
                const res = await fetch('/api/gallery/upload', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });
                if (res.ok) loadGallery();
                else alert('Upload failed');
            } catch (e) { alert('Upload error: ' + e.message); }
        }

        async function loadGallery() {
            const list = document.getElementById('gallery-grid');
            list.innerHTML = '<p class="text-slate-500 col-span-full text-center">Loading media...</p>';
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;

                const res = await fetch('/api/jobs', {headers: headers});
                const jobs = await res.json();
                const media = Object.values(jobs).filter(j => j.status === 'completed' && j.result).map(j => {
                    const r = j.result;
                    const url = r.final?.url || (typeof r === 'string' && r.startsWith('/api/results/') ? r : null);
                    return { url, goal: j.input.instruction || j.id, id: j.id };
                }).filter(m => m.url && m.url.match(/\.(png|jpg|jpeg|webp|mp4|webm)$/i));
                
                if (!media.length) {
                    list.innerHTML = '<p class="text-slate-500 col-span-full text-center py-10">No media found.</p>';
                    return;
                }

                list.innerHTML = media.map(m => {
                    const isVid = m.url.match(/\.(mp4|webm)$/i);
                    return `
                        <div class="card overflow-hidden group aspect-square bg-slate-900 shadow-xl relative">
                            ${isVid ? `<video src="${m.url}" class="w-full h-full object-cover"></video>` : `<img src="${m.url}" class="w-full h-full object-cover">`}
                            <a href="${m.url}" target="_blank" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                <i class="fas ${isVid ? 'fa-play' : 'fa-expand'} text-white text-xl"></i>
                            </a>
                            <button onclick="deleteJob('${m.id}')" class="absolute top-2 right-2 w-8 h-8 bg-red-500 hover:bg-red-600 text-white rounded-full opacity-0 group-hover:opacity-100 transition flex items-center justify-center shadow-lg">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    `;
                }).join('');
            } catch (e) { list.innerHTML = '<p class="text-red-400 col-span-full text-center">Failed to load gallery</p>'; }
        }

        async function fetchQuota() {
            try {
                const res = await fetch('/api/user/quota?email=' + encodeURIComponent(currentUserEmail));
                if (!res.ok) return;
                const quotas = await res.json();
                if (quotas.credits) {
                    const pct = Math.round((quotas.credits.remaining / quotas.credits.limit) * 100);
                    document.getElementById('quota-val').innerText = pct + '%';
                    document.getElementById('quota-bar').style.width = pct + '%';
                }
            } catch (e) {}
        }

        async function generateApiKey() {
            const label = prompt("Enter a label for this API key:");
            if (!label) return;
            const formData = new FormData();
            formData.append('label', label);
            try {
                const res = await fetch('/api/tokens/create', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.token) {
                    prompt("Your new API Key. Copy it now, it won't be shown again:", data.token);
                    // Optionally set it as default in this browser
                    if (confirm("Set this as your active token for this browser?")) {
                        localStorage.setItem('api_token', data.token);
                        alert("Token set!");
                    }
                } else {
                    alert("Failed to generate token.");
                }
            } catch (e) { alert("Error: " + e.message); }
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- Admin Check ---
        if (currentUserEmail === "yeonwoo.kim03@gmail.com") {
            document.getElementById('admin-section').classList.remove('hidden');
        }

        // --- Global Token Init ---
        if (!localStorage.getItem('api_token')) {
            localStorage.setItem('api_token', 'AI_HUB_INTERNAL');
        }

        // --- Init ---
        fetchQuota();
        setInterval(fetchQuota, 30000);

        // --- DnD ---
        document.body.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
        document.body.addEventListener('drop', e => {
            e.preventDefault(); e.stopPropagation();
            if (e.dataTransfer.files) handleFiles(e.dataTransfer.files);
        });
    </script>
</body>
</html>
