<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Hub - Multimodal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .btn-primary { background: var(--primary); transition: all 0.2s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1.5rem; transition: all 0.3s; position: relative; overflow: hidden; }
        
        /* New Single Column Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100vw;
        }
        
        /* Top Navigation Dropdown */
        #nav-tray {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        #nav-tray.open {
            max-height: 500px;
            padding-bottom: 2rem;
        }
        
        /* Workspace Area */
        #workspace-container {
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            scroll-behavior: smooth;
            width: 100%;
        }

        #chat-feed {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: 200px; /* Space for fixed input */
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header-slim { height: 3.5rem; }

        .max-w-full-content {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
        }

        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }
        
        /* Compact Input - FIXED Position */
        .input-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(to top, #0f172a 60%, transparent);
            pointer-events: none;
            z-index: 150;
        }
        
        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div class="app-container">
        <!-- Top Header -->
        <header class="h-12 flex items-center justify-between px-6 border-b border-white/5 glass z-[110] shrink-0">
            <div class="flex items-center space-x-3">
                <button onclick="window.history.back()" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/5 text-slate-400 hover:text-white transition" title="Go Back">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <a href="/" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/5 text-slate-400 hover:text-white transition" title="Home">
                    <i class="fas fa-home"></i>
                </a>
                <div class="h-6 w-px bg-white/10 mx-1"></div>
                <button onclick="toggleNavTray()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-emerald-500/20 text-slate-300 hover:text-emerald-400 transition">
                    <i class="fas fa-bars text-lg"></i>
                </button>
                <div class="flex items-center space-x-2">
                    <i class="fas fa-brain text-emerald-500 text-xl"></i>
                    <span class="font-black tracking-tighter text-lg">AI HUB</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div id="quota-info" class="hidden md:flex flex-col items-end mr-2">
                    <span class="text-[9px] font-bold text-slate-500 uppercase">Quota</span>
                    <span id="quota-val-top" class="text-xs font-black text-emerald-500">...</span>
                </div>
                <img src="{{ user_image }}" class="w-9 h-9 rounded-full border border-emerald-500/20" onerror="this.src='https://ui-avatars.com/api/?name={{ user_name }}'">
            </div>
        </header>

        <!-- Navigation Tray (Expands Downwards) -->
        <div id="nav-tray" class="px-6">
            <div class="max-w-4xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4 pt-6">
                <button onclick="switchTab('studio')" class="flex flex-col items-center p-4 rounded-2xl bg-white/5 hover:bg-emerald-500/10 border border-white/5 transition group">
                    <i class="fas fa-wand-magic-sparkles text-2xl mb-2 text-slate-500 group-hover:text-emerald-400"></i>
                    <span class="text-xs font-bold">Studio</span>
                </button>
                <button onclick="switchTab('history')" class="flex flex-col items-center p-4 rounded-2xl bg-white/5 hover:bg-emerald-500/10 border border-white/5 transition group">
                    <i class="fas fa-history text-2xl mb-2 text-slate-500 group-hover:text-emerald-400"></i>
                    <span class="text-xs font-bold">History</span>
                </button>
                <button onclick="switchTab('gallery')" class="flex flex-col items-center p-4 rounded-2xl bg-white/5 hover:bg-emerald-500/10 border border-white/5 transition group">
                    <i class="fas fa-images text-2xl mb-2 text-slate-500 group-hover:text-emerald-400"></i>
                    <span class="text-xs font-bold">Gallery</span>
                </button>
                <button onclick="generateApiKey()" class="flex flex-col items-center p-4 rounded-2xl bg-white/5 hover:bg-emerald-500/10 border border-white/5 transition group">
                    <i class="fas fa-key text-2xl mb-2 text-slate-500 group-hover:text-emerald-400"></i>
                    <span class="text-xs font-bold">API Key</span>
                </button>
            </div>
            
            <div class="max-w-4xl mx-auto flex justify-between items-center mt-6 pt-6 border-t border-white/5">
                <div id="admin-link-container" class="hidden">
                    <a href="/admin" class="px-4 py-2 bg-amber-500/10 text-amber-400 rounded-xl text-xs font-bold hover:bg-amber-500/20 transition">
                        <i class="fas fa-user-shield mr-2"></i> Admin Console
                    </a>
                </div>
                <a href="/logout" class="text-xs font-bold text-slate-500 hover:text-red-400 transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Sign Out
                </a>
            </div>
        </div>

        <!-- Workspace Area -->
        <div id="workspace-container">
            <!-- Tab: Studio -->
            <div id="tab-studio" class="tab-content active">
                <div id="chat-feed">
                    <div id="welcome-card" class="card p-8 text-center space-y-4 animate-slide-up max-w-xl mx-auto mt-10 border-emerald-500/10">
                        <div class="w-16 h-16 bg-emerald-500/10 rounded-3xl flex items-center justify-center mx-auto border border-emerald-500/20">
                            <i class="fas fa-sparkles text-emerald-400 text-2xl"></i>
                        </div>
                        <h3 class="text-2xl font-black">AI Multimodal Studio</h3>
                        <p class="text-slate-400 text-sm">One prompt for high-fidelity Image, Video, Music and Slides.</p>
                    </div>
                </div>
            </div>

            <!-- Tab: History -->
            <div id="tab-history" class="tab-content p-6">
                <div class="max-w-full-content space-y-6">
                    <div class="flex justify-between items-center px-2">
                        <h3 class="text-xl font-bold">Recent Tasks</h3>
                        <button onclick="loadHistory()" class="text-xs font-bold text-emerald-400"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
                    </div>
                    <div id="history-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
                </div>
            </div>

            <!-- Tab: Gallery -->
            <div id="tab-gallery" class="tab-content p-6">
                <div class="max-w-full-content space-y-6">
                    <div class="flex justify-between items-center px-2">
                        <h3 class="text-xl font-bold">Media Library</h3>
                        <label class="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-white rounded-xl font-bold cursor-pointer transition text-xs">
                            <i class="fas fa-upload mr-1"></i> Upload
                            <input type="file" class="hidden" accept="image/*,video/*" onchange="uploadToGallery(this.files[0])">
                        </label>
                    </div>
                    <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 pb-20"></div>
                </div>
            </div>

            <!-- Bottom Floating Input Bar -->
            <div class="input-bar-container">
                <div class="max-w-full-content mx-auto pointer-events-auto px-4 lg:px-8">
                    <div id="file-previews" class="flex flex-wrap gap-2 mb-3 empty:hidden bg-slate-900/90 p-3 rounded-2xl border border-white/5 overflow-x-auto shadow-2xl"></div>
                    
                    <div class="glass rounded-[2rem] p-2 shadow-2xl flex flex-col space-y-1 border-emerald-500/20 ring-1 ring-white/5">
                        <textarea id="main-input" rows="1" class="w-full bg-transparent px-6 py-4 text-sm lg:text-base outline-none resize-none placeholder-slate-500" placeholder="지시사항을 입력하세요..." oninput="autoResize(this)"></textarea>
                        
                        <div class="flex items-center justify-between px-4 pb-2">
                            <div class="flex items-center space-x-2">
                                <label class="p-2 text-slate-400 hover:text-emerald-400 transition cursor-pointer flex items-center space-x-1">
                                    <input type="file" id="file-input" multiple class="hidden" onchange="handleFiles(this.files)">
                                    <i class="fas fa-paperclip text-xl"></i>
                                </label>
                                <div class="h-4 w-px bg-white/10 mx-1"></div>
                                <select id="voice-provider" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none cursor-pointer hover:text-slate-300 uppercase">
                                    <option value="elevenlabs">ElevenLabs</option>
                                    <option value="local_f5">Local F5</option>
                                </select>
                                <select id="quality-selector" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none cursor-pointer hover:text-slate-300 uppercase">
                                    <option value="standard">Standard</option>
                                    <option value="high">High</option>
                                    <option value="draft">Draft</option>
                                </select>
                            </div>
                            <button id="send-btn" onclick="requestPlan()" class="btn-primary w-11 h-11 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Plan Approval Modal -->
    <div id="plan-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4">
        <div class="glass max-w-2xl w-full rounded-3xl p-8 space-y-6 shadow-2xl border-emerald-500/20 overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black">AI Implementation Plan</h3>
            <div id="plan-steps" class="space-y-3"></div>
            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="closeModal('plan-modal')" class="py-4 bg-slate-800 rounded-2xl font-bold">Cancel</button>
                <button id="confirm-execute-btn" onclick="executePlan()" class="py-4 btn-primary text-white rounded-2xl font-bold text-lg">Approve & Run</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let currentPlanData = null;
        const currentUserEmail = "{{ user_email }}";

        function toggleNavTray() {
            const tray = document.getElementById('nav-tray');
            tray.classList.toggle('open');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // Highlight logic for tray buttons could be added here
            
            // Auto close tray
            document.getElementById('nav-tray').classList.remove('open');
            
            if (tabId === 'history') loadHistory();
            if (tabId === 'gallery') loadGallery();
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleFiles(files) {
            for (let f of files) {
                if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) {
                    selectedFiles.push(f);
                }
            }
            renderFilePreviews();
        }

        function removeFile(i) {
            selectedFiles.splice(i, 1);
            renderFilePreviews();
        }

        function renderFilePreviews() {
            const container = document.getElementById('file-previews');
            container.innerHTML = selectedFiles.map((f, i) => `
                <div class="relative group bg-emerald-500/10 rounded-xl p-2 pr-8 border border-emerald-500/20 flex items-center space-x-2 shrink-0 animate-slide-up">
                    <i class="fas ${getFileIcon(f.type)} text-emerald-500 text-sm"></i>
                    <span class="text-[10px] font-bold truncate max-w-[100px]">${f.name}</span>
                    <button onclick="removeFile(${i})" class="absolute right-1 text-slate-500 hover:text-red-400 transition">
                        <i class="fas fa-times text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        function getFileIcon(type) {
            if (type.startsWith('image/')) return 'fa-image';
            if (type.startsWith('video/')) return 'fa-video';
            if (type.startsWith('audio/')) return 'fa-waveform-lines';
            return 'fa-file-lines';
        }

        async function requestPlan() {
            const instruction = document.getElementById('main-input').value.trim();
            if (!instruction && selectedFiles.length === 0) return;

            const btn = document.getElementById('send-btn');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            const formData = new FormData();
            formData.append('instruction', instruction);
            formData.append('dry_run', 'true');
            formData.append('quality', document.getElementById('quality-selector').value);
            formData.append('preferred_voice_provider', document.getElementById('voice-provider').value);
            selectedFiles.forEach(f => formData.append('files', f));

            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;

                const res = await fetch('/api/multimodal/execute', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });
                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();
                if (data.dry_run) {
                    currentPlanData = data;
                    showPlanModal(data.plan);
                }
            } catch (e) { alert('Error: ' + e.message); }
            finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        function showPlanModal(plan) {
            const container = document.getElementById('plan-steps');
            container.innerHTML = plan.steps.map((step, i) => `
                <div class="flex items-start space-x-4 p-4 rounded-2xl bg-white/5 border border-white/5">
                    <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-xs font-bold text-emerald-500 shrink-0">${i+1}</div>
                    <div class="flex-grow min-w-0">
                        <p class="text-sm font-bold text-white uppercase">${step.action.replace('.', ' ')}</p>
                        <div class="text-[9px] text-slate-500 mt-1 font-mono bg-black/20 p-2 rounded-lg overflow-x-auto">${JSON.stringify(step.inputs)}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('plan-modal').classList.remove('hidden');
        }

        async function executePlan() {
            const btn = document.getElementById('confirm-execute-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Starting...';

            const formData = new FormData();
            formData.append('instruction', currentPlanData.plan.goal);
            formData.append('dry_run', 'false');
            formData.append('quality', currentPlanData.plan.quality);
            formData.append('preferred_voice_provider', document.getElementById('voice-provider').value);
            selectedFiles.forEach(f => formData.append('files', f));

            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;

                const res = await fetch('/api/multimodal/execute', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });
                const data = await res.json();
                if (data.job_id) {
                    closeModal('plan-modal');
                    switchTab('history');
                    document.getElementById('main-input').value = '';
                    selectedFiles = [];
                    renderFilePreviews();
                }
            } catch (e) { alert('Failed: ' + e.message); }
            btn.disabled = false;
            btn.innerHTML = 'Approve & Run';
        }

        function renderJobResult(job) {
            if (job.status !== 'completed' || !job.result) return '';
            const res = job.result;
            const finalVal = res.final?.url || res.final?.value || res;
            if (typeof finalVal === 'string' && finalVal.startsWith('/api/results/')) {
                const low = finalVal.toLowerCase();
                if (low.match(/\.(png|jpg|jpeg|webp)$/)) {
                    return `<img src="${finalVal}" class="rounded-xl max-h-[300px] w-full object-cover shadow-lg mt-2">`;
                }
                if (low.match(/\.(mp4|webm)$/)) {
                    return `<video controls class="w-full rounded-xl aspect-video bg-black mt-2"><source src="${finalVal}"></video>`;
                }
                if (low.match(/\.(mp3|wav|ogg)$/)) {
                    return `<div class="bg-slate-900/80 rounded-2xl p-3 border border-emerald-500/10 mt-2 space-y-2">
                                <audio controls class="w-full h-8"><source src="${finalVal}"></audio>
                                <a href="${finalVal}" download class="text-[9px] text-slate-500 block text-right">Download Audio</a>
                            </div>`;
                }
            }
            return `<div class="p-3 bg-black/20 rounded-xl text-[9px] text-slate-500 font-mono mt-2 overflow-x-auto whitespace-pre-wrap">${JSON.stringify(res, null, 2)}</div>`;
        }

        async function loadHistory() {
            const list = document.getElementById('history-list');
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;

                const res = await fetch('/api/jobs', {headers: headers});
                const jobs = await res.json();
                list.innerHTML = Object.values(jobs).sort((a,b) => b.created_at - a.created_at).map(job => `
                    <div class="card p-6 space-y-3 relative group animate-slide-up hover:border-emerald-500/30 transition">
                        <div class="flex justify-between items-start">
                            <span class="px-2 py-0.5 rounded bg-emerald-500/10 text-[9px] font-black uppercase text-emerald-400">${job.type}</span>
                            <span class="text-[10px] font-black ${getStatusColor(job.status)} uppercase">${job.status}</span>
                        </div>
                        <p class="text-xs font-bold text-slate-200 line-clamp-2">${job.input.instruction || job.id}</p>
                        ${renderJobResult(job)}
                        ${job.error ? `<p class="text-[10px] text-red-400 mt-2 font-mono">${job.error}</p>` : ''}
                    </div>
                `).join('');
            } catch (e) { list.innerHTML = '<p class="text-red-400">Sync Failed</p>'; }
        }

        function getStatusColor(s) {
            if (s === 'completed') return 'text-emerald-400';
            if (s === 'failed') return 'text-red-400';
            return 'text-blue-400 animate-pulse';
        }

        async function loadGallery() {
            const list = document.getElementById('gallery-grid');
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;

                const res = await fetch('/api/jobs', {headers: headers});
                const jobs = await res.json();
                const media = Object.values(jobs).filter(j => j.status === 'completed' && j.result).map(j => {
                    const r = j.result;
                    const url = r.final?.url || (typeof r === 'string' && r.startsWith('/api/results/') ? r : null);
                    return { url, goal: j.input.instruction || j.id, id: j.id };
                }).filter(m => m.url && m.url.match(/\.(png|jpg|jpeg|webp|mp4|webm|mp3|wav|ogg)$/i));
                
                if (!media.length) {
                    list.innerHTML = '<p class="text-slate-500 col-span-full text-center py-20">No media found.</p>';
                    return;
                }

                list.innerHTML = media.map(m => {
                    const isVid = m.url.match(/\.(mp4|webm)$/i);
                    const isAud = m.url.match(/\.(mp3|wav|ogg)$/i);
                    return `
                        <div class="card overflow-hidden group aspect-square bg-slate-900 relative">
                            ${isVid ? `<video src="${m.url}" class="w-full h-full object-cover"></video>` : (isAud ? `<div class="w-full h-full flex items-center justify-center bg-slate-800"><i class="fas fa-waveform-lines text-emerald-500"></i></div>` : `<img src="${m.url}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">`)}
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center space-x-2">
                                <a href="${m.url}" target="_blank" class="w-10 h-10 bg-white text-slate-950 rounded-full flex items-center justify-center hover:scale-110 transition"><i class="fas ${isVid || isAud ? 'fa-play' : 'fa-expand'}"></i></a>
                                <button onclick="deleteJob('${m.id}')" class="w-10 h-10 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { list.innerHTML = '<p class="text-red-400 col-span-full text-center">Sync Error</p>'; }
        }

        async function uploadToGallery(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;
                const res = await fetch('/api/gallery/upload', { method: 'POST', headers: headers, body: formData });
                if (res.ok) loadGallery();
            } catch (e) {}
        }

        async function deleteJob(jobId) {
            if (!confirm('Delete this asset?')) return;
            try {
                const token = localStorage.getItem('api_token');
                const headers = {};
                if (token && token !== 'AI_HUB_INTERNAL') headers['Authorization'] = "Bearer " + token;
                await fetch('/api/jobs/' + jobId, { method: 'DELETE', headers: headers });
                loadGallery();
                loadHistory();
            } catch (e) {}
        }

        async function generateApiKey() {
            const label = prompt("Enter Key Label:");
            if (!label) return;
            const formData = new FormData();
            formData.append('label', label);
            try {
                const res = await fetch('/api/tokens/create', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.token) {
                    prompt("API KEY:", data.token);
                    if (confirm("Set as session token?")) {
                        localStorage.setItem('api_token', data.token);
                        location.reload();
                    }
                }
            } catch (e) {}
        }

        async function fetchQuota() {
            try {
                const res = await fetch('/api/user/quota?email=' + encodeURIComponent(currentUserEmail));
                if (!res.ok) return;
                const quotas = await res.json();
                if (quotas.credits) {
                    const pct = Math.round((quotas.credits.remaining / quotas.credits.limit) * 100);
                    document.getElementById('quota-val-top').innerText = pct + '%';
                    const bar = document.getElementById('quota-bar');
                    if (bar) bar.style.width = pct + '%';
                }
            } catch (e) {}
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- Init ---
        if (currentUserEmail === "yeonwoo.kim03@gmail.com") document.getElementById('admin-link-container').classList.remove('hidden');
        if (!localStorage.getItem('api_token')) localStorage.setItem('api_token', 'AI_HUB_INTERNAL');
        
        fetchQuota();
        setInterval(fetchQuota, 30000);
        document.body.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
        document.body.addEventListener('drop', e => {
            e.preventDefault(); e.stopPropagation();
            if (e.dataTransfer.files) handleFiles(e.dataTransfer.files);
        });
    </script>
</body>
</html>
